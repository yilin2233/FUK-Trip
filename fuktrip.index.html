<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九州自駕行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F8F9FA; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold text-center mb-6 text-gray-700">🇯🇵 熊本福岡自駕行程</h1>
    
    <div class="card">
        <div class="flex justify-between items-center mb-2">
            <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full text-sm font-bold">Day 2 阿蘇火山</span>
            <span class="text-gray-500 text-xs">☀️ 晴天預報</span>
        </div>
        <ul class="space-y-3">
            <li class="flex justify-between items-center">
                <span>上色見熊野座神社</span>
                <a href="https://www.google.com/maps/search/?api=1&query=上色見熊野座神社" target="_blank" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">📍導航</a>
            </li>
            <li class="flex justify-between items-center">
                <span>阿蘇火山 / 草千里</span>
                <a href="https://www.google.com/maps/search/?api=1&query=阿蘇火山" target="_blank" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">📍導航</a>
            </li>
        </ul>
    </div>

    <div class="card bg-gray-50 border-2 border-dashed border-gray-200">
        <h3 class="font-bold mb-2">💰 快速記帳</h3>
        <input type="number" id="expense" placeholder="輸入金額" class="border p-1 w-full rounded mb-2">
        <button onclick="saveExp()" class="bg-gray-800 text-white w-full py-2 rounded">儲存金額</button>
        <p class="mt-2 text-sm">目前累計：<span id="total">0</span> JPY</p>
    </div>

    <script>
        function saveExp() {
            const val = document.getElementById('expense').value;
            localStorage.setItem('trip_cost', val);
            document.getElementById('total').innerText = val;
            alert('儲存成功！');
        }
        window.onload = () => {
            document.getElementById('total').innerText = localStorage.getItem('trip_cost') || 0;
        }
    </script>
</body>
</html>
